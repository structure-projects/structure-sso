<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>统一门户系统</title>
    <style>
      #app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background-color: #ffffff;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 99999;
      }
      #app-loading .loading-spinner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      #app-loading .spinner {
        width: 56px;
        height: 56px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #13c2c2;
        border-radius: 50%;
        animation: spin 1.2s linear infinite;
        box-shadow: 0 0 20px rgba(19, 194, 194, 0.2);
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      #app-loading p {
        color: #13c2c2;
        font-size: 16px;
        font-weight: 500;
        margin: 0;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p>加载中...</p>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
