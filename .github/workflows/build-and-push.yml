name: Build and Push to Aliyun

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.2.3)'
        required: true
        type: string

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and push structure-oauth-server-boot Docker image of huangzhou
        uses: docker/build-push-action@v5
        with:
          context: ./
          push: true
          tags: |
            registry.cn-hangzhou.aliyuncs.com/structured/structured-sso:${{ env.RELEASE_VERSION }}
            registry.cn-hangzhou.aliyuncs.com/structured/structured-sso:latest

